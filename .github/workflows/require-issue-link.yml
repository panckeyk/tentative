name: Require Issue Link

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-issue-link:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const regex = /(close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\s+#\d+/i;
            const relatedRegex = /#\d+/;

            if (regex.test(body)) {
              console.log("✅ PR references an issue with a closing keyword.");
            } else if (relatedRegex.test(body)) {
              console.log("⚠️ PR references an issue but without a closing keyword (e.g. 'Closes #5'). Allowed, but issue won't auto-close.");
            } else {
              core.setFailed("❌ PR description must reference an issue, e.g. 'Closes #5' or 'Related to #5'.");
            }