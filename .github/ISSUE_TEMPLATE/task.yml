name: "📌 Task"
description: Create a new task with user story, flow, and acceptance criteria.
title: "[Ticket #] - [Task Title]"
labels: ["task"]
projects: ["panckeyk/6"]
assignees: ["jellablue","anthonyA1214","arkmers","Jhon Railei Dugayo","Vinmar12","khaito1771"]
body:
  - type: input
    id: ticket-number
    attributes:
      label: Ticket #
      description: "Format: Sprint#-Epic#-Module# - Module Name"
      placeholder: "01-01-01 - Login"
    validations:
      required: true

  - type: input
    id: epic
    attributes:
      label: Epic
      placeholder: "01 - User Authentication"
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a [type of user], I want to [do something], so that [reason/benefit]."
      placeholder: "As a registered user, I want to log in with my email and password, so that I can access my dashboard securely."
    validations:
      required: true

  - type: input
    id: figma-reference
    attributes:
      label: Reference (Figma)
      placeholder: "Insert Figma link here"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done
    validations:
      required: true

  - type: textarea
    id: flow
    attributes:
      label: Flow
      description: Step-by-step flow of the feature
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Field/input validation rules
    validations:
      required: false

  - type: textarea
    id: display-behavior
    attributes:
      label: Display Behavior
      description: How the UI should behave (loading states, error messages, etc.)
    validations:
      required: false

  - type: textarea
    id: edge-cases
    attributes:
      label: Edge Cases
      description: Unusual or boundary scenarios to consider
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Checklist of conditions that must be met for this task to be considered done
      value: |
        - [ ] Criteria 1
        - [ ] Criteria 2
        - [ ] Criteria 3
    validations:
      required: true
